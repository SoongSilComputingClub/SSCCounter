<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSCCounter</title>

  <script src="./js/tailwind.config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/darkmode.css" />
</head>

<body class="bg-gray-50 min-h-screen">
  <!-- Header -->
  <header class="bg-white/80 backdrop-blur-lg border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-2.5">
          <div class="w-9 h-9 bg-gradient-to-br from-brand-500 to-brand-700 rounded-xl flex items-center justify-center shadow-lg shadow-brand-200">
            <i data-lucide="users" class="w-5 h-5 text-white"></i>
          </div>
          <span class="text-xl font-bold text-gray-900 tracking-tight">SSC<span class="text-brand-600">Counter</span></span>
        </div>
        <div class="flex items-center gap-3">
          <button id="dark-toggle" onclick="toggleDark()" class="w-9 h-9 rounded-xl bg-gray-100 hover:bg-gray-200 dark:bg-slate-700 dark:hover:bg-slate-600 flex items-center justify-center transition-colors" aria-label="다크모드 전환">
            <i data-lucide="moon" class="w-[18px] h-[18px] text-gray-600 dark:hidden"></i>
            <i data-lucide="sun" class="w-[18px] h-[18px] text-amber-400 hidden dark:block"></i>
          </button>
          <div class="flex items-center gap-1.5 text-sm text-gray-500">
            <span class="inline-block w-2 h-2 rounded-full bg-emerald-400 status-badge"></span>
            <span class="hidden sm:inline">실시간</span>
          </div>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="flex gap-0 -mb-px">
        <button onclick="switchTab('home')" id="tab-home" class="nav-btn active px-5 py-3 text-sm font-semibold text-gray-400 hover:text-brand-600 transition-colors border-b-2 border-transparent">
          <span class="flex items-center gap-1.5"><i data-lucide="home" class="w-4 h-4"></i> 메인</span>
        </button>
        <button onclick="switchTab('stats')" id="tab-stats" class="nav-btn px-5 py-3 text-sm font-semibold text-gray-400 hover:text-brand-600 transition-colors border-b-2 border-transparent">
          <span class="flex items-center gap-1.5"><i data-lucide="bar-chart-3" class="w-4 h-4"></i> 통계</span>
        </button>
        <button onclick="switchTab('devs')" id="tab-devs" class="nav-btn px-5 py-3 text-sm font-semibold text-gray-400 hover:text-brand-600 transition-colors border-b-2 border-transparent">
          <span class="flex items-center gap-1.5"><i data-lucide="code-2" class="w-4 h-4"></i> 개발자</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- HOME PAGE -->
  <div id="page-home" class="page active">
    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
      <!-- Current Count Card -->
      <div class="bg-white rounded-3xl shadow-xl shadow-brand-100/50 border border-gray-100 overflow-hidden">
        <div class="home-hero-gradient bg-gradient-to-br from-brand-500 via-brand-600 to-brand-800 px-6 sm:px-10 pt-8 pb-6">
          <div class="flex items-center justify-between mb-2">
            <p class="text-brand-100 text-sm font-medium tracking-wide uppercase">현재 동아리방 인원</p>
            <span id="current-time" class="text-brand-200 text-xs font-medium bg-white/10 px-3 py-1 rounded-full"></span>
          </div>
        </div>
        <div class="px-6 sm:px-10 pt-6 pb-10 text-center relative">
          <!-- Pulse effect -->
          <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 rounded-full bg-brand-100 pulse-ring"></div>
          <div class="relative z-10">
            <div class="counter-number pulse-dot" id="counter-value">0</div>
            <p class="text-gray-400 text-lg mt-3 font-medium">명</p>
          </div>
          <div class="flex items-center justify-center gap-2 mt-6">
            <span class="inline-block w-2.5 h-2.5 rounded-full bg-emerald-400 status-badge"></span>
            <span class="text-emerald-600 text-sm font-semibold">실시간 업데이트 중</span>
          </div>
        </div>
      </div>

      <!-- Quick Info Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-6">
        <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm card-hover">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center">
              <i data-lucide="clock" class="w-5 h-5 text-blue-500"></i>
            </div>
            <span class="text-sm text-gray-500 font-medium">최근 업데이트</span>
          </div>
          <p id="last-update" class="text-xl font-bold text-gray-900">--:--</p>
        </div>
        <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm card-hover">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 rounded-xl bg-amber-50 flex items-center justify-center">
              <i data-lucide="trending-up" class="w-5 h-5 text-amber-500"></i>
            </div>
            <span class="text-sm text-gray-500 font-medium">오늘 최다 인원</span>
          </div>
          <p id="today-max" class="text-xl font-bold text-gray-900">0명</p>
        </div>
        <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm card-hover">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center">
              <i data-lucide="activity" class="w-5 h-5 text-emerald-500"></i>
            </div>
            <span class="text-sm text-gray-500 font-medium">오늘 평균</span>
          </div>
          <p id="today-avg" class="text-xl font-bold text-gray-900">0명</p>
        </div>
      </div>

      <!-- Hourly Mini Chart -->
      <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm mt-6">
        <h3 class="text-gray-900 font-bold text-lg mb-4 flex items-center gap-2">
          <i data-lucide="calendar-days" class="w-5 h-5 text-brand-500"></i>
          오늘 시간대별 인원
        </h3>
        <div class="h-48">
          <canvas id="miniChart"></canvas>
        </div>
      </div>
    </main>
  </div>

  <!-- STATS PAGE -->
  <div id="page-stats" class="page">
    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
      <div class="fade-in">
        <div class="mb-8">
          <h2 class="text-2xl sm:text-3xl font-bold text-gray-900">시간대별 통계</h2>
          <p class="text-gray-500 mt-1">동아리방 이용 패턴을 한눈에 확인하세요</p>
        </div>

        <!-- Day selector -->
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2" id="day-selector">
          <button onclick="selectDay('mon')" data-day="mon" class="day-btn px-4 py-2 rounded-xl text-sm font-semibold bg-brand-600 text-white transition-all">월</button>
          <button onclick="selectDay('tue')" data-day="tue" class="day-btn px-4 py-2 rounded-xl text-sm font-semibold bg-white text-gray-600 border border-gray-200 hover:border-brand-300 transition-all">화</button>
          <button onclick="selectDay('wed')" data-day="wed" class="day-btn px-4 py-2 rounded-xl text-sm font-semibold bg-white text-gray-600 border border-gray-200 hover:border-brand-300 transition-all">수</button>
          <button onclick="selectDay('thu')" data-day="thu" class="day-btn px-4 py-2 rounded-xl text-sm font-semibold bg-white text-gray-600 border border-gray-200 hover:border-brand-300 transition-all">목</button>
          <button onclick="selectDay('fri')" data-day="fri" class="day-btn px-4 py-2 rounded-xl text-sm font-semibold bg-white text-gray-600 border border-gray-200 hover:border-brand-300 transition-all">금</button>
        </div>

        <!-- Main Stats Chart -->
        <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm mb-6">
          <h3 class="text-gray-900 font-bold text-lg mb-1">시간대별 평균 인원</h3>
          <p class="text-gray-400 text-sm mb-4" id="stats-subtitle">최근 4주 평균 기준</p>
          <div class="h-72 sm:h-80">
            <canvas id="statsChart"></canvas>
          </div>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm text-center card-hover">
            <div class="w-12 h-12 rounded-2xl bg-brand-50 flex items-center justify-center mx-auto mb-3">
              <i data-lucide="users" class="w-6 h-6 text-brand-600"></i>
            </div>
            <p id="stat-peak-avg" class="text-2xl font-bold text-gray-900">0</p>
            <p class="text-xs text-gray-400 mt-1 font-medium">최고 시간대 평균</p>
          </div>
          <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm text-center card-hover">
            <div class="w-12 h-12 rounded-2xl bg-emerald-50 flex items-center justify-center mx-auto mb-3">
              <i data-lucide="user-check" class="w-6 h-6 text-emerald-600"></i>
            </div>
            <p id="stat-daily-avg" class="text-2xl font-bold text-gray-900">0</p>
            <p class="text-xs text-gray-400 mt-1 font-medium">일일 평균 인원</p>
          </div>
          <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm text-center card-hover">
            <div class="w-12 h-12 rounded-2xl bg-amber-50 flex items-center justify-center mx-auto mb-3">
              <i data-lucide="flame" class="w-6 h-6 text-amber-500"></i>
            </div>
            <p id="stat-peak-hour" class="text-2xl font-bold text-gray-900">--</p>
            <p class="text-xs text-gray-400 mt-1 font-medium">가장 붐비는 시간</p>
          </div>
          <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm text-center card-hover">
            <div class="w-12 h-12 rounded-2xl bg-violet-50 flex items-center justify-center mx-auto mb-3">
              <i data-lucide="moon" class="w-6 h-6 text-violet-500"></i>
            </div>
            <p id="stat-quiet-hour" class="text-2xl font-bold text-gray-900">--</p>
            <p class="text-xs text-gray-400 mt-1 font-medium">가장 한산한 시간</p>
          </div>
        </div>
      </div>
    </main>
  </div>

<!-- DEVS PAGE -->
  <div id="page-devs" class="page">
    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
      <div class="fade-in">
        <div class="mb-8 flex flex-col sm:flex-row sm:items-end justify-between gap-4">
          <div>
            <h2 class="text-2xl sm:text-3xl font-bold text-gray-900">개발자 정보</h2>
            <p class="text-gray-500 mt-1">SSCCounter를 만든 사람들</p>
          </div>
          <!-- 전체 프로젝트 GitHub 링크  -->
          <a href="https://github.com/SoongSilComputingClub" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 px-4 py-2 bg-gray-900 text-white dark:bg-white dark:text-gray-900 rounded-xl text-sm font-semibold hover:bg-gray-800 dark:hover:bg-gray-100 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
            SSCC GitHub
          </a>
        </div>

        <!-- 버전별 섹션이 들어갈 컨테이너 -->
        <div class="space-y-12" id="dev-sections">
          <!-- Cards will be generated by JS -->
        </div>
      </div>
    </main>
  </div>

  <!-- Footer -->
  <footer class="border-t border-gray-100 bg-white mt-8 dark:border-gray-700 dark:bg-gray-900">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-6 flex flex-col sm:flex-row items-center justify-between gap-3">
      <p class="text-sm text-gray-400">© 2026 SSCC</p>
    </div>
  </footer>
<script src="./js/data.js"></script>
<script src="./js/charts.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
